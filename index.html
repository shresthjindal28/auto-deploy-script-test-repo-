<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <input type="text" id="display" readonly value="0">
    <div class="buttons">
      <button data-action="clear" class="btn op">C</button>
      <button data-action="toggle" class="btn op">±</button>
      <button data-action="percent" class="btn op">%</button>
      <button data-action="operator" class="btn op">÷</button>
      <button data-action="number" class="btn">7</button>
      <button data-action="number" class="btn">8</button>
      <button data-action="number" class="btn">9</button>
      <button data-action="operator" class="btn op">×</button>
      <button data-action="number" class="btn">4</button>
      <button data-action="number" class="btn">5</button>
      <button data-action="number" class="btn">6</button>
      <button data-action="operator" class="btn op">−</button>
      <button data-action="number" class="btn">1</button>
      <button data-action="number" class="btn">2</button>
      <button data-action="number" class="btn">3</button>
      <button data-action="operator" class="btn op">+</button>
      <button data-action="number" class="btn zero">0</button>
      <button data-action="decimal" class="btn">.</button>
      <button data-action="equals" class="btn eq">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
